name: Monthly Rebalance & NAV Update

on:
  # 每天 UTC 15:00 執行（台灣時間 23:00，美東 10-11 AM 開盤中段）
  schedule:
    - cron: '0 15 * * 1-5'   # 週一到週五（美股交易日）
  # 手動觸發（測試用）
  workflow_dispatch:

jobs:
  oracle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install web3 alpaca-py

      - name: Monthly Rebalance (1st of month only)
        env:
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          ALCHEMY_RPC_URL:         ${{ secrets.ALCHEMY_RPC_URL }}
          ORACLE_PRIVATE_KEY:      ${{ secrets.ORACLE_PRIVATE_KEY }}
          FUND_CONTRACT_ADDRESS:   ${{ secrets.FUND_CONTRACT_ADDRESS }}
          USDC_CONTRACT_ADDRESS:   ${{ secrets.USDC_CONTRACT_ADDRESS }}
          ALPACA_API_KEY:          ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:       ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          if [ "$(date +%d)" = "01" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "=== 1st of month: running full rebalance ==="
            python oracle/oracle_service.py --action rebalance
          else
            echo "=== Daily NAV update only ==="
            python oracle/oracle_service.py --action nav
          fi
