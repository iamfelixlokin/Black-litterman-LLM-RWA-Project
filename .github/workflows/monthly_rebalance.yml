name: Monthly Rebalance & NAV Update

on:
  # 每天 UTC 15:00 執行（台灣時間 23:00，美東 10-11 AM 開盤中段）
  schedule:
    - cron: '0 15 * * 1-5'   # 週一到週五（美股交易日）
  # 手動觸發（測試用）
  workflow_dispatch:

jobs:
  oracle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install web3 alpaca-py

      - name: Decide action (rebalance on first trading day of month)
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          python - <<'EOF'
          import os, sys
          from datetime import date
          from alpaca.trading.client import TradingClient
          from alpaca.trading.requests import GetCalendarRequest

          today = date.today()
          first = today.replace(day=1)

          client = TradingClient(
              os.environ["ALPACA_API_KEY"],
              os.environ["ALPACA_SECRET_KEY"],
              paper=True,
          )
          calendar = client.get_calendar(
              filters=GetCalendarRequest(
                  start=first.isoformat(),
                  end=today.isoformat(),
              )
          )
          # First entry in calendar = first trading day of month
          first_trading_day = calendar[0].date if calendar else None
          is_first = (first_trading_day == today)
          print(f"Today: {today}, First trading day of month: {first_trading_day}, Is first: {is_first}")
          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"ORACLE_ACTION={'rebalance' if is_first else 'nav'}\n")
          EOF

      - name: Run Oracle
        env:
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          ALCHEMY_RPC_URL:         ${{ secrets.ALCHEMY_RPC_URL }}
          ORACLE_PRIVATE_KEY:      ${{ secrets.ORACLE_PRIVATE_KEY }}
          FUND_CONTRACT_ADDRESS:   ${{ secrets.FUND_CONTRACT_ADDRESS }}
          USDC_CONTRACT_ADDRESS:   ${{ secrets.USDC_CONTRACT_ADDRESS }}
          ALPACA_API_KEY:          ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:       ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "=== Manual trigger: running full rebalance ==="
            python oracle/oracle_service.py --action rebalance
          elif [ "$ORACLE_ACTION" = "rebalance" ]; then
            echo "=== First trading day of month: running full rebalance ==="
            python oracle/oracle_service.py --action rebalance
          else
            echo "=== Daily NAV update only ==="
            python oracle/oracle_service.py --action nav
          fi
